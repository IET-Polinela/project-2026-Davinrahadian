{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Detail Laporan</h2>

<dl class="row">
    <dt class="col-sm-3">Judul</dt>
    <dd class="col-sm-9">{{ object.title }}</dd>

    <dt class="col-sm-3">Kategori</dt>
    <dd class="col-sm-9">{{ object.category }}</dd>

    <dt class="col-sm-3">Deskripsi</dt>
    <dd class="col-sm-9">{{ object.description }}</dd>

    <dt class="col-sm-3">Lokasi</dt>
    <dd class="col-sm-9">{{ object.location }}</dd>

    <dt class="col-sm-3">Status</dt>
    <dd class="col-sm-9">{{ object.status }}</dd>
</dl>

<a href="{% url 'report_list' %}" class="btn btn-secondary">Kembali</a>
{% endblock %}
