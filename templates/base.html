<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>IET Smart City</title>

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Style (optional) -->
    <style>
       
       body {
            background-color: #f4f6f9;
        }
    
    </style>

</head>
<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <a href="/dashboard/">Dashboard</a>
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏙️ IET Smart City</a>

        <div>
            <a class="nav-link d-inline text-white" href="/">Home</a>
            <a class="nav-link d-inline text-white" href="/about/">About</a>
            <a class="nav-link d-inline text-white" href="/contacts/">Contact</a>
        </div>
    </div>
</nav>

<!-- ✅ CONTENT -->
<div class="container mt-4">
    <div class="card shadow-sm p-3">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
<a href="/dashboard/">Dashboard</a>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-success">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
