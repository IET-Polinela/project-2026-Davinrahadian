<!DOCTYPE html>
<html>
<head>
    <title>IET City</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f6f9;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #1abc9c;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }
    </style>

</head>
<body>

<header>
    <h1>🏙️ IET Smart City</h1>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/about/">About</a>
    <a href="/contacts/">Contact</a>
</nav>

<div class="container">
    <div class="card">
        {% block content %}
        {% endblock %}
    </div>
</div>

</body>
</html>
