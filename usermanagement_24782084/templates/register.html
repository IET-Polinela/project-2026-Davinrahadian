{% extends 'base.html' %}

{% block title %}Register Citizen{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Registrasi Citizen</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success">Daftar Sekarang</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
