{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Daftar Laporan</h2>
    <a href="{% url 'create_report' %}" class="btn btn-success btn-sm">+ Tambah Laporan</a>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover align-middle mb-0">
        <thead class="table-primary">
            <tr>
                <th>Judul</th>
                <th>Deskripsi</th>
                <th>Lokasi</th>
                <th style="width: 220px;">Aksi</th>
            </tr>
        </thead>
        <tbody>
            {% for report in reports %}
            <tr>
                <td class="fw-semibold">{{ report.title }}</td>
                <td>{{ report.description }}</td>
                <td>{{ report.location }}</td>
                <td class="d-flex gap-2">
                    <a href="{% url 'report_detail' report.id %}" class="btn btn-outline-primary btn-sm">View</a>
                    <a href="{% url 'update_report' report.id %}" class="btn btn-outline-warning btn-sm">Edit</a>
                    <a href="{% url 'delete_report' report.id %}" class="btn btn-outline-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center text-muted py-4">Belum ada laporan</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
