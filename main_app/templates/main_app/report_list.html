<!DOCTYPE html>
<html>
<head>
    <title>Report List</title>
</head>
<body>

<h1>Daftar Laporan</h1>

<a href="{% url 'report_create' %}">+ Tambah Laporan</a>

<ul>
    {% for report in reports %}
        <li>
            <b>{{ report.title }}</b> - {{ report.status }}
            <br>
            <a href="{% url 'report_detail' report.pk %}">Detail</a>
            <a href="{% url 'report_update' report.pk %}">Edit</a>
            <a href="{% url 'report_delete' report.pk %}">Delete</a>
        </li>
    {% empty %}
        <li>Tidak ada laporan</li>
    {% endfor %}
</ul>

</body>
</html>
