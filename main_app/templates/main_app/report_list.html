{% extends 'base.html' %}

{% block content %}
<h2>📋 Daftar Laporan</h2>

<a href="{% url 'add_report' %}" 
style="background:#1abc9c;color:white;padding:8px;border-radius:5px;text-decoration:none;">
➕ Tambah Laporan
</a>

<br><br>

<table border="1" cellpadding="10" style="border-collapse: collapse; width:100%;">
    <tr style="background:#eee;">
        <th>Judul</th>
        <th>Deskripsi</th>
        <th>Status</th>
    </tr>

    {% for report in reports %}
    <tr>
        <td>{{ report.title }}</td>
        <td>{{ report.description }}</td>
        <td>{{ report.status }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">Belum ada laporan</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
